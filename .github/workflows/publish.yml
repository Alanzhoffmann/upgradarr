name: Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore tools
        run: dotnet tool restore

      - name: Get version from nbgv
        id: nbgv
        run: |
          VERSION_JSON=$(dotnet tool run nbgv get-version -f json)
          echo "version=$(echo "$VERSION_JSON" | jq -r '.SimpleVersion')" >> $GITHUB_OUTPUT
          echo "public_release=$(echo "$VERSION_JSON" | jq -r '.PublicRelease')" >> $GITHUB_OUTPUT

      - name: Compute container tags
        id: tags
        run: |
          PUBLIC_RELEASE="${{ steps.nbgv.outputs.public_release }}"
          VERSION="${{ steps.nbgv.outputs.version }}"

          if [ "$PUBLIC_RELEASE" = "true" ]; then
            echo "tags=latest;${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "tags=unstable" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Publish container
        run: |
          dotnet publish Upgradarr.Api/Upgradarr.Api.csproj \
            -t:PublishContainer \
            -c Release \
            -p:ContainerRegistry=ghcr.io \
            -p:ContainerRepository=${{ steps.image.outputs.name }} \
            -p:ContainerImageTags="${{ steps.tags.outputs.tags }}"

      - name: Create GitHub Release
        if: steps.nbgv.outputs.public_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.nbgv.outputs.version }}
          name: Release v${{ steps.nbgv.outputs.version }}
          generate_release_notes: true
