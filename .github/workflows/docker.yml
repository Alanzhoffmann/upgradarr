name: Publish Docker image

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Restore tools
      run: dotnet tool restore

    - name: Get version from nbgv
      id: nbgv
      run: |
        VERSION_JSON=$(dotnet tool run nbgv get-version -f json)
        echo "version=$(echo "$VERSION_JSON" | jq -r '.SimpleVersion')" >> $GITHUB_OUTPUT
        echo "public_release=$(echo "$VERSION_JSON" | jq -r '.PublicRelease')" >> $GITHUB_OUTPUT

    - name: Compute container tags
      id: tags
      run: |
        PUBLIC_RELEASE="${{ steps.nbgv.outputs.public_release }}"
        VERSION="${{ steps.nbgv.outputs.version }}"

        if [ "$PUBLIC_RELEASE" = "true" ]; then
          echo "tags=latest;${VERSION}" >> $GITHUB_OUTPUT
        elif [ "$GITHUB_REF_NAME" = "main" ]; then
          echo "tags=unstable" >> $GITHUB_OUTPUT
        else
          SAFE_BRANCH=$(echo "$GITHUB_REF_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "tags=$SAFE_BRANCH" >> $GITHUB_OUTPUT
        fi

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set image name
      id: image
      run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Publish container
      run: |
        dotnet publish Huntarr.Net.Api/Huntarr.Net.Api.csproj \
          -t:PublishContainer \
          -c Release \
          -p:ContainerRegistry=ghcr.io \
          -p:ContainerRepository=${{ steps.image.outputs.name }} \
          -p:ContainerImageTags="${{ steps.tags.outputs.tags }}"
