name: Build & Test

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --results-directory ./TestResults  -- --coverage --coverage-output-format cobertura --report-trx

      - name: Upload test results
        if: always()  # Run even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./TestResults/*.cobertura.xml
          
  publish-results:
    name: Publish Test Results
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        pattern: test-results
        path: ./test-results

    - name: Download all coverage results
      uses: actions/download-artifact@v4
      with:
        pattern: coverage
        path: ./coverage

    - name: Comment PR with results
      if: (!cancelled())
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: ./test-results/*.trx
        comment_mode: always

    - name: Code Coverage Report
      if: (!cancelled())
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: ./coverage/**/*.cobertura.xml
        badge: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        output: both
        thresholds: '60 80'

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md